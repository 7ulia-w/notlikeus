<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Blog Post Title</h1>
    </header>
    <article>
        <p>This is the content of the blog post. It includes details about the topic discussed.</p>
    </article>
    <section>
        <h2>Comments</h2>
        <div class="comments">
            <div class="comment">
                <p><strong>User1:</strong> This is a comment on the blog post.</p>
            </div>
            <div class="comment">
                <p><strong>User2:</strong> Another insightful comment.</p>
            </div>
        </div>
        <form action="#">
            <label for="comment">Add a comment:</label><br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea><br>
            <button type="submit">Submit</button>
        </form>
    </section>
</body>
</html>
